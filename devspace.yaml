version: v2beta1
name: card-manager

images:
  db:
    image: card-manager-db
    dockerfile: ./database/Dockerfile
    context: ./database

  app:
    image: card-manager-app
    dockerfile: ./app/Dockerfile
    context: ./app

deployments:
  card-manager:
    kubectl:
      manifests:
        - manifests/db.yml
        - manifests/app.yml

dev:
  db:
    imageSelector: card-manager-db
    ports:
      - port: "5432:5432"

  app:
    imageSelector: card-manager-app
    ports:
      - port: "3000:3000"
