apiVersion: v1
kind: Secret
metadata:
  name: card-manager-db-secret
  labels:
    app: card-manager-db
type: Opaque
stringData:
  postgres-db: card_manager
  postgres-user: postgres
  postgres-password: postgres
  database-url: postgres://postgres:postgres@database:5432/card_manager

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: card-manager-db
  labels:
    app: card-manager-db
spec:
  replicas: 1
  serviceName: database
  selector:
    matchLabels:
      app: card-manager-db
  template:
    metadata:
      labels:
        app: card-manager-db
    spec:
      containers:
        - name: database
          image: card-manager-db
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: card-manager-db-secret
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: card-manager-db-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: card-manager-db-secret
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - card_manager
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - card_manager
            initialDelaySeconds: 15
            periodSeconds: 20
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: database
  labels:
    app: card-manager-db
spec:
  type: ClusterIP
  selector:
    app: card-manager-db
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: postgres
