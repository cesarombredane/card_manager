apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-manager-app
  labels:
    app: card-manager-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: card-manager-app
  template:
    metadata:
      labels:
        app: card-manager-app
    spec:
      containers:
        - name: app
          image: card-manager-app
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: card-manager-db-secret
                  key: database-url
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: card-manager-app
  labels:
    app: card-manager-app
spec:
  type: ClusterIP
  selector:
    app: card-manager-app
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
