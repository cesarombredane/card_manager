apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-manager-app
  namespace: card-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: card-manager-app
  template:
    metadata:
      labels:
        app: card-manager-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
      containers:
        - name: app
          image: pokemon-card-manager-app:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
